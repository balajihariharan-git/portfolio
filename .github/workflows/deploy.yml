name: Deploy Portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
          cat >> ~/.ssh/config << 'SSHCFG'
          Host *
            ServerAliveInterval 30
            ServerAliveCountMax 10
          SSHCFG

      - name: Sync code to VPS
        run: |
          rsync -azP --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.env*' \
            --exclude='uploads' \
            -e "ssh -i ~/.ssh/vps_key" \
            ./ ubuntu@${{ secrets.VPS_HOST }}:/home/ubuntu/balaji-portfolio/

      - name: Run database migrations
        run: |
          ssh -i ~/.ssh/vps_key ubuntu@${{ secrets.VPS_HOST }} << 'EOF'
            cd /home/ubuntu/balaji-portfolio
            # Install deps for migration runner (if not cached)
            npm ci --ignore-scripts 2>/dev/null
            # Get DATABASE_URL from .env
            export $(grep DATABASE_URL .env | xargs)
            # Run drizzle schema migrations and content migration via Docker network
            # (portfolio-postgres hostname only resolves inside Docker network)
            docker run --rm \
              --network=$(docker inspect balaji-portfolio --format='{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{end}}' | head -1) \
              -v /home/ubuntu/balaji-portfolio:/work \
              -w /work \
              -e DATABASE_URL="$DATABASE_URL" \
              node:22-alpine sh -c '
                npm install --no-save gray-matter reading-time 2>/dev/null
                npx drizzle-kit push --force 2>&1 || echo "Schema migration warning"
                npx tsx scripts/migrate-content.ts 2>&1
              '
          EOF

      - name: Build and deploy container
        run: |
          ssh -i ~/.ssh/vps_key ubuntu@${{ secrets.VPS_HOST }} << 'EOF'
            cd /home/ubuntu
            docker compose build balaji-portfolio
            docker compose up -d balaji-portfolio
          EOF

      - name: Health check
        run: |
          sleep 15
          ssh -i ~/.ssh/vps_key ubuntu@${{ secrets.VPS_HOST }} \
            'curl -sf http://localhost:5000/' || exit 1
          echo "Portfolio deployed successfully"
